<p>Want to get in touch? Use the email icon below to send me a message and I will get back to you as soon as possible!</p>

<form action="https://formsubmit.co/personnejamais81@gmail.com" method="POST" id="contactForm">
  
  <input type="hidden" name="_subject" value="New Contact from Blog!">
  <input type="hidden" name="_template" value="table">
  <input type="text" name="_captcha" value="false" style="display:none">

  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Name</label>
      <input type="text" name="name" class="form-control" placeholder="Name" required>
    </div>
  </div>

  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="Email Address" required>
    </div>
  </div>

  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Message</label>
      <textarea rows="5" name="message" class="form-control" placeholder="Message" required></textarea>
    </div>
  </div>

  <br>
  <div class="form-group">
    <button type="submit" class="btn btn-primary">Send</button>
  </div>
</form>
